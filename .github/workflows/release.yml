name: release

on:
  push:
    branches: [main]
    paths:
      - data/parameter-definitions-rich.json
      - parameters/index.json
      - schemas/**
      - package.json

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package.json version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

      - name: Build release notes
        if: steps.tag.outputs.exists == 'false'
        id: notes
        run: |
          prev=$(git tag --sort=-creatordate | grep -v "^v${{ steps.pkg.outputs.version }}$" | head -1 || true)
          {
            echo 'body<<EOF'
            if [ -n "$prev" ]; then
              echo "### Commits since $prev affecting rich.json"
              echo
              git log "$prev..HEAD" --pretty=format:'- %s (%h)' -- data/parameter-definitions-rich.json || true
              echo
              echo
            fi
            echo '### Ontology metadata'
            echo '```json'
            node -e "console.log(JSON.stringify(require('./parameters/index.json').metadata, null, 2))"
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
